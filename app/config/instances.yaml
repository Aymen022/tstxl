# Shared service account for all XLD instances
default_credentials:
  username: ${XLD_USERNAME}
  password: ${XLD_PASSWORD}
  verify_ssl: true

# XLDeploy instances (inherit default_credentials)
instances:
  xldeploy-p-30:
    url: https://xldeploy-p-30.example.com
  deploy-p-08:
    url: https://deploy-p-08.example.com

# Maps applicationId to allowed XLD instances
allowed_instances_by_app:
  "131187451481":
    - xldeploy-p-30
    - deploy-p-08